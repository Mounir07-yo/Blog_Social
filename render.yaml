services:
  - type: web
    name: arex-social
    runtime: php
    plan: free
    region: oregon
    branch: main
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    startCommand: chmod +x render-start.sh && ./render-start.sh
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: AREX
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: error
      - key: BCRYPT_ROUNDS
        value: 10
      - key: TRUSTED_PROXIES
        value: "*"

databases:
  - name: arex-database
    plan: free
    region: oregon