[build]
command = "composer install --no-dev --optimize-autoloader"

[deploy]
command = "php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=$PORT"

[php]
version = "8.2"
extensions = ["pdo", "pdo_mysql", "mysql", "mysqli", "redis", "curl", "mbstring", "gd", "zip", "xml", "openssl"]