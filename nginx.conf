server {
    listen 80;
    server_name votre-domaine.com www.votre-domaine.com;
    root /var/www/blog-social/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    # Gestion des fichiers statiques
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Gestion PHP
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Sécurité - cacher les fichiers sensibles
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Optimisation - cache des assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Upload d'images - limite de taille
    client_max_body_size 10M;

    # Logs
    error_log /var/log/nginx/blog-social-error.log;
    access_log /var/log/nginx/blog-social-access.log;
}